name: Materialize candidate campaign

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect campaign package
        id: package
        shell: bash
        run: |
          if [[ -f campaign-source.tgz.b64 ]]; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi
      - name: Expand campaign package
        if: steps.package.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -f campaign-source.tgz.b64
          base64 --decode campaign-source.tgz.b64 > /tmp/campaign-source.tar.gz
          tar -xzf /tmp/campaign-source.tar.gz -C .
          rm -f campaign-source.tgz.b64
          rm -rf bootstrap
      - name: Commit complete campaign
        if: steps.package.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Publish complete enterprise AI candidate campaign"
          git push
