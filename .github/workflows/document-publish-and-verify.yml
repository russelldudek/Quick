name: Publish and verify candidate documents

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'qa/document-download-live-audit.json'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install renderer and verifier
        run: |
          python -m pip install --upgrade pip
          python -m pip install weasyprint pypdf

      - name: Generate and verify five PDF documents
        run: |
          set -euo pipefail
          rm -rf docs
          mkdir -p docs
          weasyprint resume.html docs/Russell-Dudek-Quik-Hire-Enterprise-AI-Resume.pdf
          weasyprint cover-letter.html docs/Russell-Dudek-Quik-Hire-Enterprise-AI-Cover-Letter.pdf
          weasyprint interview-brief.html docs/Russell-Dudek-Enterprise-AI-Interview-Thesis-Brief.pdf
          weasyprint 90-day-plan.html docs/Russell-Dudek-Enterprise-AI-First-90-Days.pdf
          weasyprint backplane-review.html docs/Russell-Dudek-Enterprise-AI-Backplane-Review.pdf
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          expected = {
              'Russell-Dudek-Quik-Hire-Enterprise-AI-Resume.pdf': 2,
              'Russell-Dudek-Quik-Hire-Enterprise-AI-Cover-Letter.pdf': 1,
              'Russell-Dudek-Enterprise-AI-Interview-Thesis-Brief.pdf': 3,
              'Russell-Dudek-Enterprise-AI-First-90-Days.pdf': 3,
              'Russell-Dudek-Enterprise-AI-Backplane-Review.pdf': 1,
          }
          for name, expected_pages in expected.items():
              path = Path('docs') / name
              raw = path.read_bytes()
              pages = len(PdfReader(str(path)).pages)
              assert raw.startswith(b'%PDF-'), name
              assert len(raw) > 10_000, (name, len(raw))
              assert pages == expected_pages, (name, pages, expected_pages)
              print(f'PASS {name}: {pages} pages, {len(raw)} bytes')
          PY
          rm -rf /tmp/quick-docs
          cp -a docs /tmp/quick-docs

      - name: Commit PDFs to the latest main without a race
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git reset --hard origin/main
          rm -rf docs
          cp -a /tmp/quick-docs docs
          git add docs/*.pdf
          if ! git diff --cached --quiet; then
            git commit -m 'Publish verified candidate documents [skip ci]'
            git push origin HEAD:main
          fi

      - name: Configure Pages
        id: configure
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Upload complete site
        id: upload
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Verify live URLs are real PDFs
        run: |
          set -euo pipefail
          BASE='https://russelldudek.github.io/Quick'
          rm -rf /tmp/live-quick-docs
          mkdir -p /tmp/live-quick-docs
          files=(
            'Russell-Dudek-Quik-Hire-Enterprise-AI-Resume.pdf'
            'Russell-Dudek-Quik-Hire-Enterprise-AI-Cover-Letter.pdf'
            'Russell-Dudek-Enterprise-AI-Interview-Thesis-Brief.pdf'
            'Russell-Dudek-Enterprise-AI-First-90-Days.pdf'
            'Russell-Dudek-Enterprise-AI-Backplane-Review.pdf'
          )
          for file in "${files[@]}"; do
            url="$BASE/docs/$file"
            success=0
            for attempt in $(seq 1 30); do
              code=$(curl -L -sS -o "/tmp/live-quick-docs/$file" -w '%{http_code}' "$url" || true)
              if [[ "$code" == '200' ]] && [[ "$(head -c 5 "/tmp/live-quick-docs/$file" 2>/dev/null || true)" == '%PDF-' ]]; then
                success=1
                break
              fi
              echo "Attempt $attempt: $code $url"
              sleep 5
            done
            test "$success" = '1' || { echo "Live PDF verification failed: $url"; exit 1; }
            echo "PASS 200 PDF $url"
          done

      - name: Build live verification receipt
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          from pypdf import PdfReader

          expected = {
              'Russell-Dudek-Quik-Hire-Enterprise-AI-Resume.pdf': 2,
              'Russell-Dudek-Quik-Hire-Enterprise-AI-Cover-Letter.pdf': 1,
              'Russell-Dudek-Enterprise-AI-Interview-Thesis-Brief.pdf': 3,
              'Russell-Dudek-Enterprise-AI-First-90-Days.pdf': 3,
              'Russell-Dudek-Enterprise-AI-Backplane-Review.pdf': 1,
          }
          report = {
              'status': 'passed',
              'base_url': 'https://russelldudek.github.io/Quick',
              'all_live_downloads_verified': True,
              'documents': {},
          }
          for name, expected_pages in expected.items():
              path = Path('/tmp/live-quick-docs') / name
              raw = path.read_bytes()
              pages = len(PdfReader(str(path)).pages)
              assert raw.startswith(b'%PDF-')
              assert pages == expected_pages
              report['documents'][name] = {
                  'url': f'https://russelldudek.github.io/Quick/docs/{name}',
                  'http_status': 200,
                  'content_signature': '%PDF-',
                  'bytes': len(raw),
                  'pages': pages,
                  'sha256': hashlib.sha256(raw).hexdigest(),
              }
          out = Path('/tmp/document-download-live-audit.json')
          out.write_text(json.dumps(report, indent=2) + '\n')
          PY

      - name: Commit live receipt to the latest main without a race
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git reset --hard origin/main
          mkdir -p qa
          cp /tmp/document-download-live-audit.json qa/document-download-live-audit.json
          git add qa/document-download-live-audit.json
          if ! git diff --cached --quiet; then
            git commit -m 'Record verified live document downloads [skip ci]'
            git push origin HEAD:main
          fi
